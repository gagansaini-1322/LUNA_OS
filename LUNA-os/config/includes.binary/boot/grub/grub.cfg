# Luna OS GRUB menu
# config/includes.binary/boot/grub/grub.cfg
#
# Note: live-build normally generates grub.cfg automatically from
# --bootappend-live; this file overrides it to add the themed dark/neon
# menu with the 4 entries the spec calls for. Keep in sync with
# auto/config's --bootappend-live value if that changes.

set default="0"
set timeout=8
set timeout_style=menu

insmod all_video
insmod gfxterm
set gfxmode=auto
terminal_output gfxterm

loadfont unicode
set theme=/boot/grub/themes/luna/theme.txt

menuentry "Luna OS" {
    linux /live/vmlinuz boot=live components quiet splash persistence
    initrd /live/initrd.img
}

menuentry "Luna OS (persistence disabled / clean session)" {
    linux /live/vmlinuz boot=live components quiet splash
    initrd /live/initrd.img
}

menuentry "Luna OS (safe graphics)" {
    linux /live/vmlinuz boot=live components quiet splash persistence nomodeset
    initrd /live/initrd.img
}

menuentry "Reboot to firmware setup (UEFI)" {
    fwsetup
}
