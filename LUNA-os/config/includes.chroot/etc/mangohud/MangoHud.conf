### Luna OS — MangoHud configuration
### config/includes.chroot/etc/mangohud/MangoHud.conf

## Toggle overlay visibility
toggle_hud=Shift_L+F12

## Metrics shown (kept minimal — RAM headroom matters more than a busy HUD)
fps
frametime=0
cpu_stats
cpu_temp
gpu_stats
gpu_temp
ram
vram

## Position / style — small, corner, unobtrusive
position=top-left
font_size=18
background_alpha=0.4
text_color=39FF6B
gpu_color=2BC4FF
cpu_color=FF4FD8

## Performance — don't let the overlay itself cost meaningful RAM/CPU
fps_sampling_period=500
no_display=0
