name: Build Luna OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable i386 architecture
        run: sudo dpkg --add-architecture i386

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('LUNA-os/config/package-lists/**') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install live-build
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build xorriso isolinux syslinux-common

      - name: Configure build
        working-directory: LUNA-os
        run: sudo bash auto/config

      - name: Build Luna OS ISO
        working-directory: LUNA-os
        run: sudo lb build 2>&1 | tee build.log
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: LUNA-os/build.log
          retention-days: 14

      - name: Rename and upload ISO
        if: success()
        working-directory: LUNA-os
        run: |
          ISO=$(ls *.iso 2>/dev/null | head -1)
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mv "$ISO" "luna-os-${DATE}-${SHORT_SHA}.iso"

      - name: Upload Luna OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: LUNA-os/*.iso
          retention-days: 30
