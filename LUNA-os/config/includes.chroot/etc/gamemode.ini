# Luna OS — GameMode configuration
# config/includes.chroot/etc/gamemode.ini

[general]
; Renice the game process for better scheduling priority
renice=10
; Soft real-time scheduling for the game's main thread where supported
softrealtime=auto
; Don't show a desktop notification on activation (Luna OS has no DE notification daemon)
desiredgov=performance
defaultgov=schedutil

[filter]
; GameMode activates for any process Lutris launches.
; Lutris runs as a Flatpak (not a Debian-packaged binary), so its process
; name can show up as either "lutris" or its Flatpak app ID depending on
; how it's launched — whitelisting both.
whitelist=lutris
whitelist=net.lutris.Lutris
whitelist=retroarch
whitelist=wine
whitelist=wine64

[cpu]
; Park non-essential cores' power saving while gaming (leave blank = all cores)
park_cores=no
pin_cores=no

[gpu]
; No discrete GPU assumed — Intel iGPU tuning only, safe no-op on others
apply_gpu_optimisations=accept-responsibility
gpu_device=0
amd_performance_level=high

[supervisor]
; Allow Lutris/RetroArch/Wine to request GameMode on the game's behalf
supervisor_whitelist=lutris,net.lutris.Lutris,retroarch,wine,wine64
