name: Build Luna OS ISO

on:
  push:
    branches: [ main ]
    paths:
      - 'LUNA-os/config/**'
      - 'LUNA-os/auto/**'
      - 'LUNA-os/.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: LUNA-os

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable i386 architecture
        run: sudo dpkg --add-architecture i386

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('LUNA-os/config/package-lists/**') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install live-build
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build xorriso isolinux syslinux-common

      - name: Pre-seed live-build package cache
        run: |
          sudo mkdir -p cache/packages.chroot
          sudo cp /var/cache/apt/archives/*.deb cache/packages.chroot/ 2>/dev/null || true

      - name: Configure build
        run: sudo bash auto/config

      - name: Build Luna OS ISO
        run: sudo lb build 2>&1 | tee build.log
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: LUNA-os/build.log
          retention-days: 14

      - name: Rename ISO
        if: success()
        run: |
          ISO=$(ls *.iso 2>/dev/null | head -1)
          if [ -n "$ISO" ]; then
            DATE=$(date +%Y%m%d)
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            mv "$ISO" "luna-os-${DATE}-${SHORT_SHA}.iso"
            echo "ISO_NAME=luna-os-${DATE}-${SHORT_SHA}.iso" >> $GITHUB_ENV
          fi

      - name: Upload Luna OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ISO_NAME }}
          path: LUNA-os/*.iso
          retention-days: 30

      - name: Update apt cache
        if: success()
        run: |
          sudo cp cache/packages.chroot/*.deb /var/cache/apt/archives/ 2>/dev/null || true
