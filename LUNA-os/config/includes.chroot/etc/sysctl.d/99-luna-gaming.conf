# Luna OS — gaming-oriented sysctl tweaks
# config/includes.chroot/etc/sysctl.d/99-luna-gaming.conf

# Swappiness low — ZRAM handles memory pressure, not disk swap
vm.swappiness = 10

# Reduce dirty page writeback latency spikes (helps USB-backed root fs)
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# Favor keeping inode/dentry caches (snappier file manager / game asset loads)
vm.vfs_cache_pressure = 50

# Slightly more aggressive page cache reclaim under low-RAM pressure
vm.watermark_scale_factor = 200
