name: Build Luna OS ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends             live-build xorriso isolinux syslinux-common             grub-pc-bin grub-efi-amd64-bin ovmf

      - name: Patch lb_chroot_linux-image
        run: |
          SCRIPT=$(dpkg -L live-build | grep "lb_chroot_linux-image$")
          sudo sed -i "/dists.*Contents/{ s/.*/true/; }" "$SCRIPT"

      - name: Build Luna OS ISO
        run: |
          cd LUNA-os
          sudo lb clean --all
          sudo bash auto/config
          sudo lb build 2>&1 | tee build.log
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: LUNA-os/build.log
          retention-days: 14

      - name: Upload Luna OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: LUNA-os/*.iso
          retention-days: 30
